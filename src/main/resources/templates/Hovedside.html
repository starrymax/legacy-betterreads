<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>BetterReads</title>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle,barcode_scanner,chevron_left,chevron_right,qr_code_scanner,search&display=swap">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="stylesheet" th:href="@{/hovedside.css}">
</head>
<body>

<!--<div th:insert="~{fragments :: header}"></div>-->

<header th:fragment="header">
    <nav class="navbar">
        <span id="hamburger-icon">&#9776;</span>
        <h1 id="header"><a href="Hovedside.html">BetterReads</a></h1>
        <div class="sidebar">
            <ul class="menu">
                <li>
                    <search class="searchbar-nav">
                        <form>
                            <select aria-label="Search Filter Navbar" id="searchTypeNav">
                                <option value="books">Books</option>
                                <option value="authors">Authors</option>
                            </select>
                            <input aria-label="navsearch" id="navsearch" type="search" name="search"
                                   placeholder="Search...">
                        </form>
                    </search>
                </li>
                <li><a th:href="@{/hovedside}">Home</a></li>
                <li><a href="">My Books</a></li>
                <li><a href="">Browse</a></li>
            </ul>

        </div>
        <div class="auth-links">
            <div th:if="${username == null}">
                <a th:href="@{/signup}">Register</a>
                <a th:href="@{/login}">Login</a>
            </div>
        </div>
        <div class="user">
            <i class="material-symbols-outlined">account_circle</i>
        </div>
    </nav>
</header>

<h1 id="underHeader">goodreads but better</h1>

<div class="searchbar-container">
    <h2>Find your next book</h2>
    <div class="searchbar-main">
        <form th:action="@{/search}" method="get">
            <select name="searchType" id="typeSearch" aria-label="Search filter main">
                <option value="title">Title</option>
                <option value="author">Author</option>
                <option value="isbn">ISBN</option>
            </select>
            <input aria-label="Search bar main" type="search" id="main-search" name="query" placeholder="Search ...">
            <button class="search-btn-main" type="submit">
                <i class="material-symbols-outlined">search</i>
            </button>
            <div class="button-separator"></div>
            <button class="barcode-btn-main" type="button">
                <i class="material-symbols-outlined">barcode_scanner</i>
            </button>
        </form>
    </div>
</div>

<div class="top-picks">
    <h2>Trending</h2>
    <div class="scoll-container">
        <div class="liste">
            <button class="scroll-btn left">
                <i class="material-symbols-outlined">chevron_left</i>
            </button>
            <!-- TODO lag denne listen -->
            <img th:each="book : ${books}" th:src="${book.coverURL}" th:alt="${book.title}">
            <button class="scroll-btn right">
                <i class="material-symbols-outlined">chevron_right</i>
            </button>
        </div>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const hamburger = document.getElementById("hamburger-icon");
        const sidebar = document.querySelector(".sidebar");

        hamburger.addEventListener("click", function () {
            sidebar.classList.toggle("show-menu"); // Åpne/lukke menyen
        });

        // Klikk utenfor menyen for å lukke den
        document.addEventListener("click", function (event) {
            if (!sidebar.contains(event.target) && !hamburger.contains(event.target)) {
                sidebar.classList.remove("show-menu");
            }
        });
    });


    function scrollLeft() {
        document.querySelector(".liste").scrollBy({left: -350, behavior: "smooth"});  /* Increased from 300 to 350 */
    }

    function scrollRight() {
        document.querySelector(".liste").scrollBy({left: 350, behavior: "smooth"});   /* Increased from 300 to 350 */
    }

    document.addEventListener('DOMContentLoaded', function () {
        const leftBtn = document.querySelector(".scroll-btn.left");
        const rightBtn = document.querySelector(".scroll-btn.right");

        leftBtn.addEventListener('click', scrollLeft);
        rightBtn.addEventListener('click', scrollRight);
    });
</script>

<!--<div th:insert="~{fragments :: footer}"></div>-->
<footer th:fragment="footer" class="footer">
    <div class="footer-container">
        <div class="footer-header">
            <h1><span class="skinny">better</span><span class="fat">reads</span></h1>
        </div>
        <div class="footer-section">
            <h3>About us</h3>
            <p>...</p>
        </div>
        <div class="footer-section">
            <h3>Help</h3>
            <p>...</p>
        </div>
        <div class="footer-section">
            <h3>Contact us</h3>
            <p>...</p>
        </div>
        <div class="media"></div>
    </div>
    <div class="copyright">
        <p>&copy; 2025 BetterReads. All rights reserved.</p>
    </div>
</footer>
</body>
</html>
