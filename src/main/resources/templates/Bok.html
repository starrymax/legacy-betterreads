<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${book.title}">Book Details</title>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle,barcode_scanner,chevron_left,chevron_right,qr_code_scanner,search&display=swap">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="stylesheet" th:href="@{/book.css}">
</head>
<body>
<div th:insert="~{fragments :: header}"></div>

<div class="book-content">

    <div class="book-left">
        <div class="book-cover">
            <img th:if="${book.coverURL != null && !book.coverURL.isEmpty()}"
                 th:src="@{${book.coverURL}}" alt="Book cover">
            <img th:unless="${book.coverURL != null && !book.coverURL.isEmpty()}"
                 th:src="@{/images/template.avif}" alt="No cover available">
        </div>


        <div class="book-status">
            <label for="bookStatus">Book Status:</label>
            <select id="bookStatus" name="bookStatus" required aria-label="Book Status">
                <option value="read">Read</option>
                <option value="currently-reading">Currently Reading</option>
                <option value="to-read">To Read</option>
            </select>
        </div>



        <fieldset class="star-rating">
            <legend>Your rating:</legend>
            <div class="stars">

                <input type="radio" name="rating" value="1" id="rating1" />
                <label for="rating1">&#9733;</label>

                <input type="radio" name="rating" value="2" id="rating2" />
                <label for="rating2">&#9733;</label>

                <input type="radio" name="rating" value="3" id="rating3" />
                <label for="rating3">&#9733;</label>

                <input type="radio" name="rating" value="4" id="rating4" />
                <label for="rating4">&#9733;</label>

                <input type="radio" name="rating" value="5" id="rating5" />
                <label for="rating5">&#9733;</label>
            </div>
        </fieldset>
    </div>


    <div class="book-info">
        <div class="book-header">
            <h1 th:text="${book.title}">Book Title</h1>
            <h2 th:if="${book.subtitle}" th:text="${book.subtitle}">Subtitle</h2>
            <h3 th:text="${book.author}">Author</h3>
        </div>



        <div class="book-description">
            <h4>Description</h4>
            <p th:text="${book.description}">Description</p>
        </div>

        <p th:if="${book.genre != null && #arrays.length(book.genre) > 0}">
            <strong>Genre:</strong> <span th:text="${#strings.arrayJoin(book.genre, ', ')}">Genre</span>
        </p>
        <p th:if="${book.publicationYear}">
            <strong>Publication Year:</strong> <span th:text="${book.publicationYear}">Year</span>
        </p>

        <div class="user-review">
            <label for="userReview">Your Review</label>
            <textarea id="userReview" name="userReview" rows="4"></textarea>
            <button type="submit">Submit Review</button>
        </div>
    </div>
</div>


<div th:insert="~{fragments :: footer}"></div>
</body>
</html>
